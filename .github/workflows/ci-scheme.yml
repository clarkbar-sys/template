name: CI (Scheme)

# Scheme here means **s7** (CCRMA/Stanford) — no Guile, no Racket, no Chez.
# s7 is fetched + checksum-verified at build time (scripts/fetch-s7.sh), so the
# quality gate is: "does the interpreter compile cleanly (gcc + clang) and do
# the tests pass". Your own Scheme lives in e.g. src/, examples/, tests/.

on:
  push:
    branches: [main]
    paths:
      - "**/*.scm"
      - "scripts/fetch-s7.sh"
      - "Makefile"
      - ".github/workflows/ci-scheme.yml"
  pull_request:
    paths:
      - "**/*.scm"
      - "scripts/fetch-s7.sh"
      - "Makefile"
      - ".github/workflows/ci-scheme.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-scheme-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Preflight: only run if this repo has Scheme sources.
  # Keeps CI green on the bare template until you add code of your own.
  detect:
    runs-on: ubuntu-latest
    outputs:
      found: ${{ steps.f.outputs.found }}
    steps:
      - uses: actions/checkout@v7
      - id: f
        run: |
          if [ -n "$(git ls-files '*.scm' '*.ss' '*.sls')" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false — no Scheme sources, skipping" && echo "found=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build s7 (${{ matrix.cc }})
    needs: detect
    if: needs.detect.outputs.found == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v7
      # Compiling the fetched interpreter is the "does it even build" gate.
      - name: Build
        run: make build
      - name: Sanity check
        run: |
          echo '(display (+ 1 2 3)) (newline)' > sanity.scm
          out=$(./bin/s7 sanity.scm 2>/dev/null)
          [ "$out" = "6" ] || { echo "expected 6, got: '$out'"; exit 1; }

  test:
    name: Test
    needs: [detect, build]
    if: needs.detect.outputs.found == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # `make test` builds s7, then runs every tests/*.scm; each must exit 0.
      - name: Test
        run: make test
