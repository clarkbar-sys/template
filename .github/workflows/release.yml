name: Release

# release-please keeps a "Release PR" that bumps the version and updates
# CHANGELOG.md from Conventional Commits. Merge that PR -> it tags the release.
# When a release is cut:
#   - `artifacts` attaches a static s7 binary to the GitHub Release, and
#   - `container` builds & pushes the versioned image to GHCR.
# Both run in *this* workflow run rather than reacting to the release event,
# because releases created with GITHUB_TOKEN don't trigger other workflows.
# (Lean: no checksums / SBOM / signing.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  artifacts:
    name: Build & attach release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Build a fully static s7 interpreter (musl) — a single portable binary
      # that runs on any x86_64 Linux with no dependencies. (The versioned
      # container image is built by the `container` job below.)
      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Fetch pinned s7 source
        run: scripts/fetch-s7.sh .s7
      - name: Build static s7
        run: |
          mkdir -p out
          musl-gcc .s7/s7.c -o out/s7-linux-x86_64 \
            -DWITH_MAIN -I.s7 -O2 -static -lm
          strip out/s7-linux-x86_64
          # Smoke-test the artifact in script mode.
          echo '(display (+ 1 2 3)) (newline)' > smoke.scm
          [ "$(./out/s7-linux-x86_64 smoke.scm 2>/dev/null)" = "6" ]
      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(ls -A out 2>/dev/null)" ]; then
            gh release upload "${{ needs.release-please.outputs.tag_name }}" out/* --clobber
          else
            echo "No artifacts produced yet — wire up the build step above."
          fi

  container:
    name: Build & push versioned container to GHCR
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # tag_name is like "v1.2.3"; produce v1.2.3, 1.2, and latest.
          tags: |
            type=semver,pattern=v{{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
