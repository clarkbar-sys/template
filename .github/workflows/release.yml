name: Release

# release-please keeps a "Release PR" that bumps the version and updates
# CHANGELOG.md from Conventional Commits. Merge that PR -> it tags the release.
# When a release is cut, the `artifacts` job builds the program(s) and attaches
# them to the GitHub Release. (Lean: no checksums / SBOM / signing.)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  artifacts:
    name: Build & attach release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # TODO: build your program(s) for release into ./out. Examples:
      #   Python: pip install build && python -m build && cp dist/* out/
      #   C:      cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build
      #   Scheme: raco exe -o out/app main.rkt   (or raco distribute out app)
      - name: Build release artifacts
        run: |
          mkdir -p out
          echo "TODO: produce release artifacts into ./out"
      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(ls -A out 2>/dev/null)" ]; then
            gh release upload "${{ needs.release-please.outputs.tag_name }}" out/* --clobber
          else
            echo "No artifacts produced yet — wire up the build step above."
          fi
