name: CI (Python)

# Runs only when Python files change (path filter below).
# Stage order: static (parallel) -> build -> test+coverage / security.
# Adjust install/test commands to match your project layout.

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".github/workflows/ci-python.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy .

  build:
    name: Build
    needs: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Upload dist (downloadable from this run / PR)
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  test:
    name: Test & coverage
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # TODO: adjust to your install (e.g. `pip install -e '.[dev]'`)
      - run: pip install -e . pytest pytest-cov
      - run: pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python
          path: coverage.xml

  security:
    name: Security
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      # Drop the `|| true` once the baseline is clean so these actually gate.
      - name: Bandit (SAST)
        run: bandit -r . -q || true
      - name: pip-audit (dependency vulns)
        run: pip-audit || true
